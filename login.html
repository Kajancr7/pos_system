<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>POS Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.login-container{
height:80vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
width:380px;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">POS SYSTEM</a>
</div>
</nav>

<div class="container login-container">

<div class="card p-4 login-card shadow">

<h3 class="text-center mb-4">Login</h3>

<input id="username" class="form-control mb-3" placeholder="Username">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100">
Login
</button>

<p id="error" class="text-danger text-center mt-3"></p>

</div>

</div>

<script>
async function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

if(!username || !password){
document.getElementById("error").innerText="Enter username and password";
return;
}

try{

const res = await fetch("backend/login.php",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
});

const data = await res.text();

if(data.trim() === "success"){
window.location = "index.php";
}else{
document.getElementById("error").innerText="Invalid login";
}

}catch(err){
console.error(err);
document.getElementById("error").innerText="Server error";
}

}
</script>

<footer class="bg-dark text-white text-center py-3 mt-5">
© 2026 POS System
</footer>

</body>
</html>
